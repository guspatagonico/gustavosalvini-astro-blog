      t.appendChild(ti);
      const tn = document.createElement('div'); tn.className='num'; tn.textContent=i+1;
      t.appendChild(tn); t.addEventListener('click',()=>go(i)); strip.appendChild(t);
    });

    function go(n){
      if(n<0||n>=IMG.length||n===idx)return;
      const prev=idx; idx=n;
      if(prev>=0){
        document.querySelectorAll('.slide')[prev].classList.remove('active');
        document.querySelectorAll('.thumb')[prev].classList.remove('active');
      }
      document.querySelectorAll('.slide')[idx].classList.add('active');
      document.querySelectorAll('.thumb')[idx].classList.add('active');
      counter.textContent=(idx+1)+' / '+IMG.length;
      document.getElementById('caption').textContent=IMG[n].title;
      prevBtn.classList.toggle('hidden',idx===0);
      nextBtn.classList.toggle('hidden',idx===IMG.length-1);
      const t=document.querySelectorAll('.thumb')[idx];
      if(t) t.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
      const url = window.location.pathname + '?v=' + idx;
      try{ window.history.replaceState({v:idx},'',url); }catch(e){}
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    prevBtn.addEventListener('click',()=>go(idx-1));
    nextBtn.addEventListener('click',()=>go(idx+1));
    document.addEventListener('keydown',e=>{
      if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(idx-1)}
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();go(idx+1)}
    });

    let sx=0,sy=0;
    document.getElementById('viewer').addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY},{passive:true});
    document.getElementById('viewer').addEventListener('touchend',e=>{
      const t=e.changedTouches[0];const dx=t.clientX-sx,dy=t.clientY-sy;
      if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5) dx<0?go(idx+1):go(idx-1);
    },{passive:true});

    async function share(){
      const url = window.location.href.split('?')[0] + '?v=' + idx;
      if(navigator.share){
        try{await navigator.share({title:'De Boltzmann a ChatGPT — Cómic',url})}catch(e){}
      }else{
        try{await navigator.clipboard.writeText(url);oldShareText()}catch(e){}
      }
    }
    let shareTimer=null;
    function oldShareText(){
      const sp=shareBtn.querySelector('span');
      if(sp)sp.textContent='¡Copiado!';
      clearTimeout(shareTimer);
      shareTimer=setTimeout(()=>{if(sp)sp.textContent='Compartir'},2000);
    }
    shareBtn.addEventListener('click',share);

    const m=window.location.search.match(/[?&]v=(\d+)/);
    go(0);
    if(m){const n=parseInt(m[1],10);if(n>=0&&n<IMG.length)setTimeout(()=>go(n),100)}
  })();
</script>

</body>
</html>
